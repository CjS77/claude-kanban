# Pushing a tag `v*` cross-builds claude-kanban for every supported platform and attaches the archives to a GitHub
# Release. Asset names are a contract the launchers (bin/kanban-mcp and the Windows shim) rely on:
#
#   claude-kanban-<target>.tar.gz     (zip on Windows: claude-kanban-<target>.zip)
#   claude-kanban-<target>.sha256     (checksum of that archive — named after the archive stem, with no .tar.gz/.zip)
#
# The checksum name is upload-rust-binary-action's own convention and is what v1.2.0 onward actually published; the
# launchers request it verbatim. Do not "correct" it to <archive>.sha256 without republishing every release.
#
# Binaries live only in Releases, never in git.

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # upload-rust-binary-action only uploads assets — the release itself must already exist.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    permissions:
      contents: write # upload release assets
      id-token: write # provenance attestation (sigstore signing)
      attestations: write # provenance attestation (store the bundle)
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl # static — no glibc version coupling
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl # native arm runner, no cross/QEMU
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin # macos-13 (Intel) is retired; macos-15-intel is the current x86_64 image
            os: macos-15-intel
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        id: upload
        with:
          bin: claude-kanban
          target: ${{ matrix.target }}
          # The dependency tree is pure Rust, so plain cargo suffices everywhere (the action runs `rustup target add`
          # itself). Left unset, the action reaches for `cross` (docker) whenever target != host — which every musl
          # and cross-arch job here would trip despite needing nothing of the sort.
          build-tool: cargo
          # The action default, pinned because it is the download contract: claude-kanban-<target>.<tar.gz|zip>.
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
      # Ties each uploaded archive to this workflow run (verify: `gh attestation verify <asset> -R CjS77/claude-kanban`).
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: >-
            ${{ runner.os == 'Windows' && format('claude-kanban-{0}.zip', matrix.target)
            || format('claude-kanban-{0}.tar.gz', matrix.target) }}
