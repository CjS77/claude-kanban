{#- The epic edit form: title, colour, raw markdown body. -#}
<div class="flex items-start justify-between gap-3">
    <div>
        <span class="font-mono text-sm opacity-60">{{ epic.id }}</span>
        <h2 class="text-xl font-semibold">Edit epic</h2>
    </div>
    <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost" aria-label="close">✕</button></form>
</div>

<form hx-post="/ui/epic/{{ epic.id }}" hx-target="#detail" hx-swap="innerHTML" class="flex flex-col gap-3 mt-3">
    <div class="grid grid-cols-[1fr_8rem] gap-3">
        <label class="flex flex-col gap-1 text-sm">Title
            <input name="title" required class="input w-full" value="{{ epic.title }}">
        </label>
        <label class="flex flex-col gap-1 text-sm">Colour
            <input name="color" type="color" class="input w-full h-10 p-1" value="{{ epic.color }}">
        </label>
    </div>
    <label class="flex flex-col gap-1 text-sm">Body <span class="opacity-60">(markdown, raw)</span>
        <textarea name="body" rows="8" class="textarea w-full font-mono text-sm">{{ epic.body }}</textarea>
    </label>
    <div class="modal-action mt-1">
        <button type="button" class="btn btn-ghost" hx-get="/ui/epic/{{ epic.id }}" hx-target="#detail" hx-swap="innerHTML">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
    </div>
</form>
